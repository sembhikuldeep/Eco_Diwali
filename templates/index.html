<html>
<head>
<title>EcoDiwali: Reuse Suggestion</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(to right, #f8bbd0, #fce4ec);
    text-align: center;
    padding: 50px;
}

h1 {
    color: #880e4f;
    font-size: 2.5em;
    margin-bottom: 10px;
}

.card {
    background: white;
    border-radius: 20px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    padding: 30px;
    display: inline-block;
    width: 60%;
}

h2 {
    color: #ad1457;
}

p {
    font-size: 1.2em;
    color: #4a148c;
}

.footer {
    margin-top: 40px;
    color: #6a1b9a;
    font-size: 0.9em;
}
</style>

</head>

<body>

<h1>EcoDiwali Waste Management</h1>

<div class="card">
    <h2>{{ item }}</h2>
    <p>{{ advice }}</p>
</div>

<div class="footer">
<p>Make your Diwali cleaner and greener 🌿</p>
</div>

</body>
</html>
